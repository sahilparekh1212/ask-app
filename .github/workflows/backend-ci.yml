name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      # Any CI/automation change (workflows, dependabot config, action bumps) must run the full
      # suite too — a required check that never triggers leaves the PR permanently un-mergeable.
      - '.github/**'
  pull_request:
    paths:
      - 'Backend/**'
      - '.github/**'

jobs:
  build-test:
    name: Build, test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so diff-cover can compare against the PR base

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      # Same gates that used to run as pre-push hooks, now enforced for everyone on the PR.
      # On the Linux runner neither AI_SANDBOX_BUILD_DIR nor LOCALAPPDATA is set, so Gradle
      # uses the in-tree build/ dir (see Backend/build.gradle) and the report paths below hold.
      - name: Check Java formatting (Spotless)
        working-directory: Backend
        run: ./gradlew spotlessCheck

      - name: Compile main + test sources
        working-directory: Backend
        run: ./gradlew compileJava compileTestJava

      - name: Run tests + JaCoCo report
        working-directory: Backend
        run: ./gradlew test jacocoTestReport

      - name: Enforce 90% line coverage
        working-directory: Backend
        run: ./gradlew jacocoTestCoverageVerification

      - name: Enforce coverage on changed lines (diff-cover)
        if: github.event_name == 'pull_request' # needs a PR base to diff against
        run: |
          python3 -m pip install --quiet diff_cover
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          diff-cover \
            Backend/Audit/build/reports/jacoco/test/jacocoTestReport.xml \
            Backend/Auth/build/reports/jacoco/test/jacocoTestReport.xml \
            --src-roots Backend/Audit/src/main/java Backend/Auth/src/main/java \
            --compare-branch "origin/${{ github.base_ref }}" \
            --fail-under 90

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: Backend/*/build/reports/jacoco/test/html
          if-no-files-found: ignore

  load-test:
    name: Load test (k6)
    runs-on: ubuntu-latest
    needs: build-test # only load-test code that already passed the build/test gate
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - uses: grafana/setup-k6-action@v1

      - name: Build Audit boot jar
        working-directory: Backend
        run: ./gradlew :Audit:bootJar

      # The Audit endpoints are JWT-authenticated in every real profile; the LOADTEST profile
      # swaps in an auth-free security chain (LoadTestSecurityConfig) so k6 can hit them
      # directly. It is NEVER enabled outside this job.
      - name: Throughput load test (rate limiter off)
        run: |
          JAR=$(ls Backend/Audit/build/libs/*.jar | grep -v plain | head -1)
          SPRING_PROFILES_ACTIVE=LOCAL,LOADTEST RATELIMIT_ENABLED=false SPRING_KAFKA_LISTENER_AUTO_STARTUP=false \
            java -jar "$JAR" > audit-throughput.log 2>&1 &
          APP_PID=$!
          echo "Waiting for Audit to become healthy..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8083/actuator/health >/dev/null && { echo "healthy"; break; }
            kill -0 "$APP_PID" 2>/dev/null || { echo "app exited early"; cat audit-throughput.log; exit 1; }
            sleep 2
          done
          k6 run Backend/load-test/search-stats.js
          status=$?
          kill "$APP_PID" 2>/dev/null || true
          exit $status

      - name: Rate-limit behaviour test (rate limiter on)
        run: |
          JAR=$(ls Backend/Audit/build/libs/*.jar | grep -v plain | head -1)
          SPRING_PROFILES_ACTIVE=LOCAL,LOADTEST SPRING_KAFKA_LISTENER_AUTO_STARTUP=false \
            java -jar "$JAR" > audit-ratelimit.log 2>&1 &
          APP_PID=$!
          for i in $(seq 1 60); do
            curl -sf http://localhost:8083/actuator/health >/dev/null && break
            kill -0 "$APP_PID" 2>/dev/null || { echo "app exited early"; cat audit-ratelimit.log; exit 1; }
            sleep 2
          done
          k6 run Backend/load-test/rate-limit.js
          status=$?
          kill "$APP_PID" 2>/dev/null || true
          exit $status

      - name: Upload load-test app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-app-logs
          path: audit-*.log
          if-no-files-found: ignore

  trivy:
    name: Trivy CVE scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      # Boot jars bundle their dependencies, which is what Trivy's jar analyzer scans for CVEs.
      - name: Build boot jars
        working-directory: Backend
        run: ./gradlew :Audit:bootJar :Auth:bootJar

      - name: Stage jars for scanning
        run: |
          mkdir -p trivy-jars
          cp Backend/Audit/build/libs/*.jar Backend/Auth/build/libs/*.jar trivy-jars/
          ls -la trivy-jars

      # Report everything to the Security tab (does not fail the job).
      - name: Trivy scan → SARIF (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: trivy-jars
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-jars

      # Gate: fail on fixable HIGH/CRITICAL CVEs in dependencies.
      - name: Trivy scan → gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: trivy-jars
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      # Build the actual deployable images so Trivy's image analyzer can also catch base-image/OS
      # CVEs (e.g. in eclipse-temurin:17-jre-alpine) — the jar scan above only covers bundled
      # dependencies, not the OS layer. Each Dockerfile's COPY paths are relative to Backend/ (its
      # own header comment's "repo root" means Backend/, not the actual git root one level up), so
      # this must run with Backend/ as both the working directory and the build context.
      - name: Build Docker images
        working-directory: Backend
        run: |
          docker build -f Audit/Dockerfile -t audit-service:ci .
          docker build -f Auth/Dockerfile -t auth-service:ci .

      # Report-only for now (this job is a required branch-protection check — see TODO.md): confirm
      # a green run against the current base images before adding exit-code: '1' here too.
      - name: Trivy scan Audit image → SARIF (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: audit-service:ci
          format: sarif
          output: trivy-audit-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy scan Auth image → SARIF (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: auth-service:ci
          format: sarif
          output: trivy-auth-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy Audit image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-audit-image.sarif
          category: trivy-audit-image

      - name: Upload Trivy Auth image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-auth-image.sarif
          category: trivy-auth-image

  # Secret scanning, file hygiene and commit-message linting run repo-wide in the
  # Lint workflow (.github/workflows/lint.yml). CodeQL SAST runs in codeql.yml, and
  # Dependabot (.github/dependabot.yml) opens update PRs for vulnerable dependencies.
