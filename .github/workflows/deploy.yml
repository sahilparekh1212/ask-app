# Deploys the compose stack to the production GCE VM after CD has pushed fresh images.
#
# Auth is keyless: Workload Identity Federation exchanges the workflow's GitHub OIDC token
# for the deploy service account — no exported JSON key exists anywhere. The same trust
# chain as the cosign keyless signing in cd.yml, pointed the other direction.
#
# Gated on the repository variable DEPLOY_ENABLED == 'true', so this workflow can merge and
# sit dormant until the one-time GCP setup (WIF pool/provider, deploy SA, VM OS Login) and
# the repository secrets exist. Flip the variable to arm it; workflow_dispatch triggers a
# first deploy without waiting for a merge.
#
# Secret handling on the VM: everything single-line goes into /opt/ai-sandbox/.env (read by
# docker compose interpolation); the RSA signing key is multi-line PEM, which .env cannot
# carry, so it ships as a 600-mode file and is exported into the shell that runs
# `docker compose up` (shell env beats .env in compose precedence).
name: Deploy

on:
  workflow_run:
    workflows: [CD]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GCP_ZONE: us-east1-b
  GCP_VM: ai-sandbox-vm
  APP_DIR: /opt/ai-sandbox

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    # Run only when armed, and (for the workflow_run trigger) only after a successful CD
    # on main. workflow_dispatch skips the conclusion check — there is no triggering run.
    if: >-
      vars.DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Register SSH key with OS Login (60m TTL)
        # Without this, `gcloud compute ssh` implicitly registers the runner's fresh key
        # with a short service-account expiry — long enough for the first steps, expired by
        # the later ones (observed live: scp 'Permission denied (publickey)' ~6 minutes into
        # a run whose first SSH had succeeded; gcloud does not re-import an expired key).
        # Registering explicitly with a TTL that outlives any run makes every subsequent
        # ssh/scp deterministic.
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -f ~/.ssh/google_compute_engine -N '' -q
          gcloud compute os-login ssh-keys add \
            --key-file="$HOME/.ssh/google_compute_engine.pub" --ttl=60m --quiet

      - name: Prepare app directory on the VM
        # Retried: the very first connection can still race OS Login key propagation
        # (observed as ssh exit 255 on an otherwise healthy setup). Later ssh/scp steps
        # reuse the now-propagated key and don't need this.
        run: |
          for attempt in 1 2 3; do
            if gcloud compute ssh "$GCP_VM" --zone="$GCP_ZONE" --quiet --command \
              "sudo mkdir -p $APP_DIR/deploy $APP_DIR/secrets && sudo chown -R \$(whoami) $APP_DIR && chmod 700 $APP_DIR/secrets"; then
              exit 0
            fi
            echo "ssh attempt $attempt failed; retrying in 20s"
            sleep 20
          done
          exit 1

      - name: Ship compose bundle
        run: |
          gcloud compute scp --zone="$GCP_ZONE" --quiet \
            Backend/docker-compose.yml Backend/docker-compose.ghcr.yml Backend/docker-compose.prod.yml \
            "$GCP_VM:$APP_DIR/"
          gcloud compute scp --zone="$GCP_ZONE" --quiet \
            Backend/deploy/Caddyfile "$GCP_VM:$APP_DIR/deploy/"
          # The monitoring stack mounts its configs from the tree (prometheus/loki/tempo/grafana).
          gcloud compute scp --zone="$GCP_ZONE" --quiet --recurse \
            Backend/monitoring "$GCP_VM:$APP_DIR/"

      - name: Ship environment and signing key
        run: |
          umask 077
          cat > .env.deploy <<EOF
          DOMAIN=${{ vars.DEPLOY_DOMAIN }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          AI_SANDBOX_TAG=latest
          EOF
          printf '%s\n' "${{ secrets.AUTH_RSA_PRIVATE_KEY }}" > auth_key.pem
          gcloud compute scp --zone="$GCP_ZONE" --quiet .env.deploy "$GCP_VM:$APP_DIR/.env"
          gcloud compute scp --zone="$GCP_ZONE" --quiet auth_key.pem "$GCP_VM:$APP_DIR/secrets/auth_key.pem"
          gcloud compute ssh "$GCP_VM" --zone="$GCP_ZONE" --quiet --command \
            "chmod 600 $APP_DIR/.env $APP_DIR/secrets/auth_key.pem"
          rm -f .env.deploy auth_key.pem

      - name: Pull images and restart the stack
        run: |
          gcloud compute ssh "$GCP_VM" --zone="$GCP_ZONE" --quiet --command \
            "cd $APP_DIR && export AUTH_RSA_PRIVATE_KEY=\"\$(cat secrets/auth_key.pem)\" && \
             sudo -E docker compose -f docker-compose.yml -f docker-compose.ghcr.yml -f docker-compose.prod.yml pull --quiet && \
             sudo -E docker compose -f docker-compose.yml -f docker-compose.ghcr.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans"

      # GF_SECURITY_ADMIN_PASSWORD only applies when Grafana initializes a FRESH database —
      # on any subsequent boot the env var is silently ignored and whatever password the DB
      # was first created with stays. Resetting via grafana-cli on every deploy makes the
      # secret authoritative regardless of the DB's history (first deploy, recreated
      # container, or a value that drifted). Reads the password from the .env just shipped,
      # so it can't disagree with what compose passed to the container. Plain `docker exec`
      # on the fixed container name, NOT `docker compose exec` — compose would re-interpolate
      # the files and trip the AUTH_RSA_PRIVATE_KEY :? fail-fast, which only the restart
      # step's shell exports (that's exactly how this step failed on its first run).
      - name: Reset Grafana admin password to the current secret
        run: |
          gcloud compute ssh "$GCP_VM" --zone="$GCP_ZONE" --quiet --command \
            "cd $APP_DIR && set -a && . ./.env && set +a && \
             sudo docker exec aisandbox-grafana \
               grafana cli admin reset-admin-password \"\$GRAFANA_ADMIN_PASSWORD\" >/dev/null && \
             echo 'Grafana admin password reset to the deployed secret'"

      - name: Smoke-check through the public origin
        run: |
          DOMAIN="${{ vars.DEPLOY_DOMAIN }}"
          # curl's own retry machinery instead of a hand-rolled loop: --retry-all-errors
          # covers the Let's Encrypt first-issuance window (TLS handshake failures while
          # Caddy is still obtaining the cert — this lost the race on the first deploy) as
          # well as Spring's boot. Each probe gets its own ~7-minute allowance: the UI (nginx)
          # comes up fast, but the Audit service is the slow one — it re-indexes the bundled
          # RAG corpus (repo docs + backend/UI source, ~hundreds of chunks embedded via Voyage)
          # on startup, so "homepage is up" no longer implies "audit is up". Give the audit
          # health + MCP probes the same patience rather than a short post-homepage allowance.
          curl -sf --retry 40 --retry-delay 10 --retry-all-errors --max-time 15 \
            "https://$DOMAIN/" >/dev/null
          curl -sf --retry 40 --retry-delay 10 --retry-all-errors --max-time 15 \
            "https://$DOMAIN/audit-api/actuator/health" | grep -q '"UP"'
          curl -sf --retry 40 --retry-delay 10 --retry-all-errors --max-time 15 \
            -X POST "https://$DOMAIN/audit-api/mcp" -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"ping"}' | grep -q '"result"'
          # The published read-only Grafana (anonymous Viewer behind Caddy's /grafana route).
          curl -sf --retry 40 --retry-delay 10 --retry-all-errors --max-time 15 \
            "https://$DOMAIN/grafana/api/health" | grep -q '"database": *"ok"'
          echo "Deployed https://$DOMAIN"
