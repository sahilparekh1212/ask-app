name: CD

# Continuous delivery: every merge to main builds each deployable image once and pushes it to
# GitHub Container Registry with three tags — a generated SemVer (0.1.<run>), the git SHA
# (sha-<short>), and latest. Promotion between environments should happen by digest/tag, never
# by rebuilding (see Backend/docs/deployment.md). Consumers pull via
# Backend/docker-compose.ghcr.yml instead of building locally.
on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - 'UI/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

jobs:
  build-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing: the workflow's OIDC identity is the signer
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each backend Dockerfile's COPY paths treat Backend/ as the build context (their
          # header's "repo root" means Backend/), matching the trivy job in backend-ci.yml.
          # Audit additionally bundles the Angular UI source into its RAG corpus, so it receives
          # UI/ as a named build context (the Dockerfile COPYs it via --from=ui).
          - name: audit
            context: Backend
            dockerfile: Backend/Audit/Dockerfile
            build_contexts: ui=UI
          - name: auth
            context: Backend
            dockerfile: Backend/Auth/Dockerfile
            build_contexts: ''
          - name: ui
            context: UI
            dockerfile: UI/Dockerfile
            build_contexts: ''
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ai-sandbox/${{ matrix.name }}
          # 0.1.<run_number> is an honest CI-generated SemVer — monotonic per workflow run —
          # until real release tags exist; sha-<short> pins a build to its exact commit.
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=0.1.${{ github.run_number }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Extra named build context for audit (ui=UI); empty for the others. Paths are relative
          # to the checkout root, so Backend-context builds still reach UI/ by its repo-root path.
          build-contexts: ${{ matrix.build_contexts }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Supply chain: sign the pushed digest and attach an SBOM as a signed attestation.
      # Keyless — no key to store or rotate; the signature binds the image to THIS workflow's
      # OIDC identity and lands in the public Rekor transparency log. Verify with:
      #   cosign verify \
      #     --certificate-identity-regexp 'https://github.com/sahilparekh1212/AI-Sandbox/\.github/workflows/cd\.yml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     ghcr.io/sahilparekh1212/ai-sandbox/<name>@<digest>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless)
        run: cosign sign --yes "ghcr.io/${{ github.repository_owner }}/ai-sandbox/${{ matrix.name }}@${{ steps.push.outputs.digest }}"

      # syft reads the pushed image (docker login creds from the step above) and emits SPDX.
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/ai-sandbox/${{ matrix.name }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          artifact-name: sbom-${{ matrix.name }}.spdx.json

      - name: Attach SBOM attestation (cosign)
        run: >-
          cosign attest --yes --type spdxjson
          --predicate "sbom-${{ matrix.name }}.spdx.json"
          "ghcr.io/${{ github.repository_owner }}/ai-sandbox/${{ matrix.name }}@${{ steps.push.outputs.digest }}"
