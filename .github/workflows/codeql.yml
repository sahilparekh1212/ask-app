name: CodeQL

# GitHub's native SAST for the Java backend. Findings appear in the repo Security tab.
on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      # See backend-ci.yml: broadened to .github/** and UI/** so this required check reports on
      # CI/automation and frontend-only PRs too, otherwise they can never satisfy branch protection.
      - '.github/**'
      - 'UI/**'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/**'
      - 'UI/**'
  schedule:
    - cron: '0 6 * * 1' # weekly, so newly-published rules catch existing code

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      # Manual build so CodeQL traces the real compilation (autobuild can misread the
      # relocated build dir + gradlew-in-Backend layout).
      - name: Compile (production sources)
        working-directory: Backend
        run: ./gradlew compileJava

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
