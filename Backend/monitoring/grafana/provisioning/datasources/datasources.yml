# Auto-provisions Prometheus + Loki + Tempo datasources into Grafana on startup.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  # Frontend error tracking (the UI's Sentry project), via the official Sentry datasource
  # plugin (GF_INSTALL_PLUGINS on the grafana service). Credentials come from the
  # environment so this file stays committed: SENTRY_ORG_SLUG + SENTRY_AUTH_TOKEN are set
  # on the grafana container from .env (empty locally by default — the datasource then
  # exists but its queries fail with "unauthorized", the usual not-configured posture).
  - name: Sentry
    uid: Sentry
    type: grafana-sentry-datasource
    access: proxy
    jsonData:
      url: https://sentry.io
      orgSlug: $SENTRY_ORG_SLUG
    secureJsonData:
      authToken: $SENTRY_AUTH_TOKEN

  - name: Tempo
    uid: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Lets a trace panel in Explore jump straight to the matching log lines in Loki, searching
      # for the trace ID as plain text — Micrometer Tracing puts traceId/spanId into every log
      # line's MDC automatically once tracing is active (see the traceId=/spanId= fields added to
      # logback-spring.xml's patterns), so a substring search is enough; no custom tag mapping
      # needed since nothing else stamps spans with an app-specific correlation key.
      tracesToLogsV2:
        datasourceUid: Loki
        filterByTraceID: true
        filterBySpanID: false
