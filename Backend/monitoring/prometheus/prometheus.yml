# Scrapes Spring Boot Actuator/Micrometer metrics from each service.
# Targets use host.docker.internal so the container can reach services running
# on the host via `gradle bootRun`. In OpenShift, see openshift/monitoring/prometheus.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: aisandbox-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083   # audit-service
          - host.docker.internal:8084   # notification-service
          - host.docker.internal:8085   # auth-service
