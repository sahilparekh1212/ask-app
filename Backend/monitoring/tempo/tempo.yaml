# Minimal single-binary Tempo config: local disk storage, OTLP receiver only (that's all
# Auth/Audit ever send — see management.otlp.tracing.endpoint in each application.properties).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 24h
