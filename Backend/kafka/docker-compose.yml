# Local Kafka for the event-driven audit pipeline (Auth produces, Audit consumes).
# Apache Kafka in single-node KRaft mode — the broker is its own controller, no ZooKeeper.
#
#   docker compose -f Backend/kafka/docker-compose.yml up -d
#
# Then run the services pointed at the broker's host listener:
#   KAFKA_BOOTSTRAP_SERVERS=localhost:19092 ./gradlew :Audit:bootRun
#   KAFKA_BOOTSTRAP_SERVERS=localhost:19092 ./gradlew :Auth:bootRun
# Kafka UI (topics, messages, consumer groups, the audit.events.DLT dead-letter topic): http://localhost:8080
services:
  kafka:
    # NOTE: setting any KAFKA_* env var makes the image ignore its bundled server.properties,
    # so this is the complete KRaft config, not an override of defaults. Mirrors the kafka
    # service in ../docker-compose.yml — see ADR-0011 for why Kafka over Redpanda.
    image: apache/kafka:4.3.1
    container_name: askapp-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Two client listeners: INTERNAL for in-network clients (kafka-ui), EXTERNAL for host apps;
      # plus the KRaft controller listener.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Single broker: the internal topics can't have more than one replica.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_HEAP_OPTS: -Xmx512m -Xms256m
    ports:
      - "19092:19092" # host -> broker (set KAFKA_BOOTSTRAP_SERVERS=localhost:19092)
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: kafbat/kafka-ui:v1.5.0
    container_name: askapp-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: askapp
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
