apiVersion: v1
kind: ConfigMap
metadata:
  name: account-service-config
  namespace: ai-sandbox
data:
  SPRING_APPLICATION_NAME: account-service
  SERVER_PORT: "8081"
  # Profile driving this deployment — bump to SIT/UAT/PROD per cluster
  SPRING_PROFILES_ACTIVE: DEV
  SPRING_DATASOURCE_URL: jdbc:h2:mem:accountdb
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_H2_CONSOLE_ENABLED: "false"
  # Points to the auth-service Kubernetes Service (in-cluster DNS)
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8085/.well-known/jwks.json
  AUDIT_SERVICE_URL: http://audit-service:8083
  SPRINGDOC_API_DOCS_PATH: /v3/api-docs
  SPRINGDOC_SWAGGER_UI_PATH: /swagger-ui.html
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
