apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: ai-sandbox
  labels:
    app: loki
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName intentionally omitted — binds against the cluster's default StorageClass.
  # Set one explicitly if the cluster requires it, or size/class differently per environment.
