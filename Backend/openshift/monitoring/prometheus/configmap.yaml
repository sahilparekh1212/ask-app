apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ask-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: askapp-services
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - audit-service:8083
              - auth-service:8085
