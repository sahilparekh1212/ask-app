apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: ai-sandbox
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        uid: Loki
        type: loki
        access: proxy
        url: http://loki:3100
