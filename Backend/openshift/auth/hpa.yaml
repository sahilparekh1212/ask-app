# Auth scales horizontally: all pods sign with the shared AUTH_RSA_PRIVATE_KEY (from the Secret)
# and share the Redis-backed refresh-token store (AUTH_REFRESH_TOKEN_STORE=redis), so refresh and
# JWT validation work regardless of which pod a request lands on. See ADR-0007.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: ask-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
