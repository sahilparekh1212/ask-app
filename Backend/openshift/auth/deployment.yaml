apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ai-sandbox
  labels:
    app: auth-service
spec:
  # ≥2 replicas now that Auth is stateless: the refresh-token store is externalized to Redis
  # (AUTH_REFRESH_TOKEN_STORE=redis) and all pods sign with the shared AUTH_RSA_PRIVATE_KEY, so a
  # token issued by one pod is honored by any other. HPA (min 2 / max 3) scales from here.
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: image-registry.openshift-image-registry.svc:5000/ai-sandbox/auth-service:latest
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
