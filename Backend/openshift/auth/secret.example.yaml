# TEMPLATE — copy to secret.yaml (gitignored) and fill in real values, or create the
# Secret imperatively instead of committing it:
#   oc create secret generic auth-secret -n ask-app \
#     --from-literal=GOOGLE_CLIENT_ID=... \
#     --from-literal=GOOGLE_CLIENT_SECRET=... \
#     --from-file=AUTH_RSA_PRIVATE_KEY=private_pkcs8.pem
#
# Generate the RSA key (PKCS8 PEM) for AUTH_RSA_PRIVATE_KEY:
#   openssl genrsa -out private.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in private.pem -out private_pkcs8.pem
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: ask-app
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  # Paste the full PKCS8 PEM (BEGIN/END PRIVATE KEY block) of private_pkcs8.pem here.
  AUTH_RSA_PRIVATE_KEY: "REPLACE_WITH_PKCS8_PEM_PRIVATE_KEY"
