apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: ai-sandbox
  labels:
    app: audit-service
spec:
  # ≥2 replicas: Audit is already stateless — it persists to external Postgres, and its Kafka
  # consumer is idempotent by eventId (unique idx_audit_event_id + existsByEventId), so multiple
  # consumers in the group split partitions and any rebalance-induced redelivery dedups cleanly.
  replicas: 2
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: image-registry.openshift-image-registry.svc:5000/ai-sandbox/audit-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: audit-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
