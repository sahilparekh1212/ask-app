# ── Common settings (all profiles) ──────────────────────────────────────────
spring.application.name=report-service
server.port=8086

# Active profile — LOCAL by default; override with SPRING_PROFILES_ACTIVE=DEV|SIT|UAT|PROD
spring.profiles.active=${SPRING_PROFILES_ACTIVE:LOCAL}

# Spring Batch — don't auto-run jobs on startup; trigger via POST /reports/run
spring.batch.job.enabled=false

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator health endpoint (used by OpenShift liveness/readiness probes)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
# Tag every metric with the service name so Grafana can filter per service
management.metrics.tags.application=${spring.application.name}

# Rate limiter — one active request per user per endpoint; discarded clients retry after N seconds
ratelimit.enabled=true
ratelimit.retry-after-seconds=30

# Forward audit events to the standalone Audit service
audit.service.url=${AUDIT_SERVICE_URL:http://localhost:8083}
audit.publish.enabled=true

# Downstream services for cross-service UUID aggregation (POST /reports/uuids)
transaction.service.url=${TRANSACTION_SERVICE_URL:http://localhost:8082}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

# Datasource, JPA and the Auth JWK endpoint are profile-specific — see application-<PROFILE>.properties
