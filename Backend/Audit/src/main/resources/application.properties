# ── Common settings (all profiles) ──────────────────────────────────────────
spring.application.name=audit-service
server.port=8083

# Active profile — LOCAL by default; override with SPRING_PROFILES_ACTIVE=DEV|SIT|UAT|PROD
spring.profiles.active=${SPRING_PROFILES_ACTIVE:LOCAL}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator health endpoint (used by OpenShift liveness/readiness probes)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
# Tag every metric with the service name so Grafana can filter per service
management.metrics.tags.application=${spring.application.name}
# Tag every metric with the pod/host so a metric or log line can be traced to the instance
# that emitted it once >1 replica is running (HOSTNAME is set by the container runtime).
management.metrics.tags.podName=${HOSTNAME:local}
# Emit latency histogram buckets so Prometheus/Grafana can compute per-endpoint p95/p99
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Distributed tracing (Micrometer Tracing + OTel bridge + OTLP exporter — see build.gradle).
# 100% sampling is fine at this traffic volume for a demo/portfolio deployment; a real
# production workload would sample a fraction instead.
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
# Wraps the Kafka listener (and, for the DLT republish path, the producer) in an Observation, so
# a trace started by the HTTP request that published an AuditEvent continues across the consumer
# — the trace context rides in the Kafka message headers automatically, no manual propagation code.
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true

# Sentry error monitoring — captures unhandled exceptions server-side. An empty DSN (the
# default) disables the SDK entirely: no init, no network — the same graceful "not
# configured" posture as the provider keys. Performance tracing stays off (Tempo owns
# tracing); PII is never sent.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:LOCAL}
sentry.send-default-pii=false

# Rate limiter — one active request per user per endpoint; discarded clients retry after N seconds
ratelimit.enabled=true
ratelimit.retry-after-seconds=30

# Origins allowed to call this API from a browser (comma-separated). Default is the Angular
# dev server; override with CORS_ALLOWED_ORIGINS in deployed environments.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Seeds ~15 demo audit-log rows on startup under LOCAL/DEV only (see DemoDataSeeder), so the
# API isn't empty on first run. Skips if the table already has rows. Disable with false.
demo.data.seed.enabled=${DEMO_DATA_SEED_ENABLED:true}

# LLM chat assistant (server-side Claude proxy — see the assistant/ package and the ADR).
# The API key stays server-side only; with no key set, POST /api/v1/assistant/chat returns 503
# and everything else works normally. Model/max-tokens are overridable for cost tuning
# (e.g. ASSISTANT_MODEL=claude-haiku-4-5).
assistant.api-key=${ANTHROPIC_API_KEY:}
assistant.model=${ASSISTANT_MODEL:claude-opus-4-8}
assistant.max-tokens=${ASSISTANT_MAX_TOKENS:8192}

# RAG MCP server (vector search over this repo's own docs — see the rag/ package and ADR-0010).
# Same server-side-key posture as the assistant: with no VOYAGE_API_KEY, startup indexing is
# skipped and the MCP search tool reports "not configured" — everything else works key-less.
# rag.vector-store: 'memory' (default — LOCAL/tests, H2 has no pgvector) or 'pgvector' (the
# Docker/DEV+ stack sets RAG_VECTOR_STORE=pgvector; requires the Liquibase-managed rag_chunk
# table, whose vector(1024) column pins rag.embedding-dimension at 1024).
rag.enabled=${RAG_ENABLED:true}
rag.api-key=${VOYAGE_API_KEY:}
rag.embedding-model=${RAG_EMBEDDING_MODEL:voyage-3.5-lite}
rag.embedding-dimension=1024
rag.vector-store=${RAG_VECTOR_STORE:memory}

# Kafka — Audit consumes 'audit.events' (see AuditEventConsumer) and writes audit rows.
# The consumer ignores producer type headers and maps the JSON onto the shared :common AuditEvent
# record (com.askapp.common.event.AuditEvent) that Auth also publishes with.
# The producer is used by the dead-letter publisher (audit.events.DLT) AND by AuditEventPublisher,
# which emits this service's own AI-feature events (chat/RAG/MCP) back onto audit.events.
# max.block.ms is kept low so a missing/slow broker never stalls a feature request (mirrors Auth).
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=audit-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.askapp.common.event.AuditEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.askapp.common.event
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=5000

# Liquibase owns the DB schema (runs on startup for every profile); Hibernate neither creates
# nor validates it. The changelog lives at Liquibase's default path
# (classpath:/db/changelog/db.changelog-master.yaml), so no change-log property is needed.
spring.jpa.hibernate.ddl-auto=none

# Spring Batch (reference-data ingestion). The metadata schema is Liquibase-managed (changeset
# 004-spring-batch-metadata), so Spring Batch's own script initialization is off — keeping it
# idempotent across restarts on the persistent prod Postgres. job.enabled=false so the ingest job
# runs only when triggered (the startup seeder, the daily scheduler, or POST /api/v1/refdata/ingest),
# never automatically at startup.
spring.batch.jdbc.initialize-schema=never
spring.batch.job.enabled=false

# Reference-data (security master) seeding & incremental batch.
#   seed:     RefDataSeeder bulk-loads this many rows once on startup when the table is empty, so the
#             reference API / dashboard panel / RAG index aren't empty on first run (idempotent —
#             skips if rows already exist; disabled in tests).
#   schedule: RefDataIngestScheduler appends `count` fresh rows on the cron below, then re-indexes
#             RAG so the new rows are retrievable. Append-only (start index = current row count).
refdata.seed.enabled=${REFDATA_SEED_ENABLED:true}
refdata.seed.count=${REFDATA_SEED_COUNT:1000}
refdata.ingest.schedule.enabled=${REFDATA_INGEST_SCHEDULE_ENABLED:true}
refdata.ingest.schedule.count=${REFDATA_INGEST_SCHEDULE_COUNT:50}
refdata.ingest.schedule.cron=${REFDATA_INGEST_SCHEDULE_CRON:0 0 2 * * *}

# RAG indexing of the reference data: the security master is chunked (an overview + fixed-size
# windows of rows) and indexed alongside the bundled docs/code, so search_knowledge / the assistant
# can answer questions about the dataset. Synthetic (non-PII) data only — see ADR-0010.
rag.reference-data.enabled=${RAG_REFERENCE_DATA_ENABLED:true}
rag.reference-data.window-size=${RAG_REFERENCE_DATA_WINDOW_SIZE:20}

# Audit-log retention purge: AuditLogPurgeScheduler hard-deletes rows older than retention-days on
# the cron below, so the audit trail (and its indexes) stay bounded. Reference data is append-only
# and never purged. Disabled in tests.
audit.purge.enabled=${AUDIT_PURGE_ENABLED:true}
audit.purge.retention-days=${AUDIT_PURGE_RETENTION_DAYS:90}
audit.purge.cron=${AUDIT_PURGE_CRON:0 0 3 * * *}

# Datasource and the Auth JWK endpoint are profile-specific — see application-<PROFILE>.properties
