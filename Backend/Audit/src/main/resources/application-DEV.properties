# DEV — shared dev database via env vars; falls back to in-memory H2 if unset.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:auditdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.show-sql=true

spring.h2.console.enabled=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWK_SET_URI:http://auth-service:8085/.well-known/jwks.json}

logging.level.com.askapp=DEBUG
