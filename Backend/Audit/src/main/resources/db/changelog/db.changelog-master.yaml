# Liquibase master changelog at Spring Boot's default path (classpath:/db/changelog/
# db.changelog-master.yaml), so it is auto-discovered without any property — which matters
# because the test application.properties shadows the main one. Add new versioned changesets below.
databaseChangeLog:
  # Baseline schema for audit_logs. Mirrors AuditLog + AuditableEntity and the three @Index
  # definitions, so Hibernate can run with ddl-auto=none.
  - changeSet:
      id: 001-create-audit-logs
      author: aisandbox
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(255)
              - column:
                  name: action
                  type: VARCHAR(255)
              - column:
                  name: details
                  type: VARCHAR(255)
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by_request_id
                  type: VARCHAR(255)
              - column:
                  name: updated_by_request_id
                  type: VARCHAR(255)
        # Default listing (active rows, newest first) + createdAt range filters.
        - createIndex:
            indexName: idx_audit_active_created
            tableName: audit_logs
            columns:
              - column:
                  name: deleted
              - column:
                  name: created_at
        # Equality filters and the grouped /stats aggregation.
        - createIndex:
            indexName: idx_audit_entity_type_action
            tableName: audit_logs
            columns:
              - column:
                  name: entity_type
              - column:
                  name: action
        # Idempotent Kafka consumption: at most one row per source event id.
        - createIndex:
            indexName: idx_audit_event_id
            tableName: audit_logs
            unique: true
            columns:
              - column:
                  name: event_id

  # RAG chunk store (see the rag/ package and ADR-0010). Postgres-only: pgvector is a
  # Postgres extension, so this changeset never runs on H2 (LOCAL/tests), where the
  # in-memory vector store is active instead (rag.vector-store defaults to 'memory').
  # Raw SQL rather than createTable because Liquibase has no model for the vector type or
  # the extension. The vector(1024) width pins rag.embedding-dimension (Voyage's default).
  - changeSet:
      id: 002-rag-chunk
      author: aisandbox
      dbms: postgresql
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS vector
        - sql:
            sql: >-
              CREATE TABLE rag_chunk (
                id VARCHAR(64) PRIMARY KEY,
                source VARCHAR(512) NOT NULL,
                heading VARCHAR(512),
                content TEXT NOT NULL,
                embedding vector(1024) NOT NULL,
                indexed_at TIMESTAMP NOT NULL
              )
      rollback:
        - sql:
            sql: DROP TABLE rag_chunk

  # Security-master reference data (see SecurityMaster + the refdata ingestion). Runs on every
  # database (H2 and Postgres) — plain relational columns, no extension needed. Mirrors the entity
  # and its three @Index definitions so Hibernate can keep ddl-auto=none.
  - changeSet:
      id: 003-create-security-master
      author: aisandbox
      changes:
        - createTable:
            tableName: security_master
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: instrument_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: isin
                  type: VARCHAR(255)
              - column:
                  name: cusip
                  type: VARCHAR(255)
              - column:
                  name: sedol
                  type: VARCHAR(255)
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: asset_class
                  type: VARCHAR(255)
              - column:
                  name: currency
                  type: VARCHAR(255)
              - column:
                  name: price
                  type: DECIMAL(19, 2)
              - column:
                  name: as_of_date
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by_request_id
                  type: VARCHAR(255)
              - column:
                  name: updated_by_request_id
                  type: VARCHAR(255)
        # Unique business key + point lookups (GET /securities/{instrumentId}).
        - createIndex:
            indexName: idx_secmaster_instrument
            tableName: security_master
            unique: true
            columns:
              - column:
                  name: instrument_id
        # Equality filters on the listing.
        - createIndex:
            indexName: idx_secmaster_asset_class
            tableName: security_master
            columns:
              - column:
                  name: asset_class
        - createIndex:
            indexName: idx_secmaster_currency
            tableName: security_master
            columns:
              - column:
                  name: currency

  # Spring Batch 5 metadata tables (the JobRepository backing the ref-data ingestion job). Managed
  # here rather than via spring.batch.jdbc.initialize-schema so it runs exactly once per database
  # (Liquibase tracks it in DATABASECHANGELOG) and therefore survives restarts on the persistent
  # prod Postgres — the framework's own initializer would re-run CREATE TABLE and fail on boot two.
  # We load Spring Batch's own official per-dialect DDL from the spring-batch-core jar, so the
  # tables/types always match the framework version. schema-*.sql are pure CREATEs (the DROPs live
  # in schema-drop-*.sql), so running once is exactly right.
  - changeSet:
      id: 004-spring-batch-metadata-h2
      author: aisandbox
      dbms: h2
      changes:
        - sqlFile:
            path: org/springframework/batch/core/schema-h2.sql
            relativeToChangelogFile: false
            splitStatements: true
            stripComments: true
  - changeSet:
      id: 004-spring-batch-metadata-postgres
      author: aisandbox
      dbms: postgresql
      changes:
        - sqlFile:
            path: org/springframework/batch/core/schema-postgresql.sql
            relativeToChangelogFile: false
            splitStatements: true
            stripComments: true

  # createdAt-only index on audit_logs. Backs the retention purge's DELETE WHERE created_at < ?
  # (which spans active AND soft-deleted rows, so idx_audit_active_created — led by `deleted` —
  # can't serve the range) and time-range reads that don't constrain `deleted`. Mirrors the
  # matching @Index on AuditLog so Hibernate's validate (PROD/UAT) passes.
  - changeSet:
      id: 005-audit-created-at-index
      author: aisandbox
      changes:
        - createIndex:
            indexName: idx_audit_created_at
            tableName: audit_logs
            columns:
              - column:
                  name: created_at

  # Reporting view: audit activity rolled up per calendar day / entity type / action, excluding
  # soft-deleted rows. A read-only convenience for BI / Grafana / ad-hoc SQL — the app's own
  # /stats endpoint still aggregates live via Criteria, so nothing in the code path depends on this
  # view. Dialect-neutral SQL (CAST(... AS DATE) works on both H2 and Postgres), so it is created on
  # every database like the rest of the changelog. See docs/data-and-profiles.md for the rationale
  # and how to query it.
  - changeSet:
      id: 006-create-audit-daily-summary-view
      author: aisandbox
      changes:
        - createView:
            viewName: v_audit_daily_summary
            replaceIfExists: true
            selectQuery: >-
              SELECT CAST(created_at AS DATE) AS event_date,
                     entity_type,
                     action,
                     COUNT(*) AS event_count
              FROM audit_logs
              WHERE deleted = false
              GROUP BY CAST(created_at AS DATE), entity_type, action
      rollback:
        - dropView:
            viewName: v_audit_daily_summary
