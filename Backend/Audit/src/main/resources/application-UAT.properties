# UAT — mirrors PROD; external database required (no H2 fallback).
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.show-sql=false

spring.h2.console.enabled=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWK_SET_URI:http://auth-service:8085/.well-known/jwks.json}

logging.level.com.askapp=INFO
