# LOCAL — in-memory H2 with web console for easy local DB access.
# Console: http://localhost:8083/h2-console  (JDBC URL jdbc:h2:mem:auditdb, user sa, blank password)
spring.datasource.url=jdbc:h2:mem:auditdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_JWK_SET_URI:http://localhost:8085/.well-known/jwks.json}

logging.level.com.askapp=DEBUG
