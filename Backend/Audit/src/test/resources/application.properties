# Context smoke test runs under LOCAL: in-memory H2 and a lazily-built JWT decoder
# (from the LOCAL profile's jwk-set-uri — no network call at startup).
spring.profiles.active=LOCAL

# Don't start the Kafka listener in tests — there is no broker, and unit tests drive the
# consumer method directly. Avoids connection-retry noise and slow context startup.
spring.kafka.listener.auto-startup=false

# Keep the context-loading tests deterministic and fast: no 1000-row reference seed on startup,
# and no scheduled ingest/purge jobs registered. Tests that exercise these drive the seeder /
# service / scheduler beans directly or enable the flags via @TestPropertySource.
refdata.seed.enabled=false
refdata.ingest.schedule.enabled=false
audit.purge.enabled=false
