# ── Common settings (all profiles) ──────────────────────────────────────────
spring.application.name=auth-service
server.port=8085

# Active profile — LOCAL by default; override with SPRING_PROFILES_ACTIVE=DEV|SIT|UAT|PROD
spring.profiles.active=${SPRING_PROFILES_ACTIVE:LOCAL}

# Google OAuth2 — replace with real credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Demo login for recruiters: POST /auth/login with {"username":"demo","password":"demo"} issues
# the same JWTs as Google sign-in (no OAuth setup required). Set auth.demo.enabled=false to
# disable in a non-demo deployment. NOTE: this is a deliberate shared demo account, not a secret.
auth.demo.enabled=${AUTH_DEMO_ENABLED:true}
auth.demo.username=${AUTH_DEMO_USERNAME:demo}
auth.demo.password=${AUTH_DEMO_PASSWORD:demo}

# RSA key for JWT signing — set AUTH_RSA_PRIVATE_KEY (PKCS8 PEM) in shared/prod envs.
# When absent, an ephemeral key is generated (dev only, breaks across pod restarts / replicas).
auth.rsa.private-key=${AUTH_RSA_PRIVATE_KEY:}

# Refresh-token store: "in-memory" (default — single replica / dev / tests) or "redis" (shared
# across horizontally-scaled Auth pods; the piece that makes Auth stateless — see ADR-0007).
# Under "in-memory" the spring.data.redis.* settings below are unused and no Redis connection opens.
auth.refresh-token.store=${AUTH_REFRESH_TOKEN_STORE:in-memory}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator health endpoint (used by OpenShift liveness/readiness probes)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
# Tag every metric with the service name so Grafana can filter per service
management.metrics.tags.application=${spring.application.name}
# Tag every metric with the pod/host so a metric or log line can be traced to the instance
# that emitted it once >1 replica is running (HOSTNAME is set by the container runtime).
management.metrics.tags.podName=${HOSTNAME:local}
# Emit latency histogram buckets so Prometheus/Grafana can compute per-endpoint p95/p99
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Distributed tracing (Micrometer Tracing + OTel bridge + OTLP exporter — see build.gradle).
# 100% sampling is fine at this traffic volume for a demo/portfolio deployment; a real
# production workload would sample a fraction instead.
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
# Wraps every KafkaTemplate.send() (the LOGIN/TOKEN_REFRESH/LOGOUT publishes) in an Observation,
# so the trace started by the originating HTTP request continues into the AuditEvent Kafka
# message headers and on into Audit's consumer — no manual trace-context propagation code needed.
spring.kafka.template.observation-enabled=true

# Rate limiter — one active request per user per endpoint; discarded clients retry after N seconds
ratelimit.enabled=true
ratelimit.retry-after-seconds=30

# Origins allowed to call this API from a browser (comma-separated). Default is the Angular
# dev server; override with CORS_ALLOWED_ORIGINS in deployed environments.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Where OAuth2LoginSuccessHandler redirects after a successful Google login, with the issued
# tokens in the URL fragment (POST /auth/login's demo login is unaffected — that's a JSON API
# response, not a browser-navigation redirect). Default is the Angular dev server.
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Kafka — Auth publishes audit events to the 'audit.events' topic (see AuditEventPublisher).
# max.block.ms is kept low so a missing/slow broker never stalls an auth request.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=5000
