# One-command way to run the whole system: the Angular UI, Postgres, Kafka (Redpanda), Auth,
# Audit, and the observability stack (Prometheus/Grafana/Loki/Tempo).
#
#   docker compose up --build
#
# First build takes a few minutes — each service's multi-stage Dockerfile runs a full Gradle
# build with no layer caching for Gradle's own cache. Once up:
#   UI:                http://localhost:4200            (demo login: demo / demo)
#   Auth Swagger:      http://localhost:8085/swagger-ui.html
#   Audit Swagger:     http://localhost:8083/swagger-ui.html
#   Grafana:           http://localhost:4200/grafana    (anonymous read-only; admin / admin to edit)
#   Redpanda console:  http://localhost:8080
#   Postgres:          localhost:5432                    (audit / audit, db "auditdb")
#
# Try it without any Google OAuth setup: POST http://localhost:8085/auth/login with
# {"username":"demo","password":"demo"} issues a JWT good against both services. To use real
# Google sign-in instead, export GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET before starting.
#
# Narrower alternatives for a smaller local loop: kafka/docker-compose.yml (just Redpanda) and
# monitoring/docker-compose.yml (just Prometheus/Loki/Grafana) — this file inlines both rather
# than composing them so it stays a single, predictable `docker compose up`.
services:
  postgres:
    # pgvector's official image = postgres:16 + the vector extension preinstalled, which the
    # RAG feature's Liquibase changeset enables (CREATE EXTENSION vector). Drop-in compatible
    # with the previous postgres:16-alpine volume.
    image: pgvector/pgvector:pg16
    container_name: aisandbox-postgres
    environment:
      POSTGRES_DB: auditdb
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d auditdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: aisandbox-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
      # Two listeners: 'internal' for in-network clients (Auth/Audit/console), 'external' for the host.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092" # host -> broker
      - "9644:9644"   # admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: aisandbox-redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: aisandbox-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      # The -compose variant discovers services via Docker DNS (all replicas), not host ports.
      - ./monitoring/prometheus/prometheus-compose.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.1.1
    container_name: aisandbox-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: aisandbox-tempo
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo query API (Grafana datasource)
      - "4318:4318"   # OTLP HTTP receiver (management.otlp.tracing.endpoint)

  grafana:
    image: grafana/grafana:11.2.0
    container_name: aisandbox-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Serve under /grafana so the UI's same-origin system-view links work through the ui
      # nginx proxy (http://localhost:4200/grafana) exactly like prod's Caddy route; direct
      # http://localhost:3000 redirects to :3000/grafana, so the old URL still lands right.
      # Anonymous Viewer mirrors the prod posture (read-only without a login); admin/admin
      # remains for editing dashboards locally. Prod overrides root_url + admin password.
      - GF_SERVER_ROOT_URL=http://localhost:4200/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Official Sentry datasource plugin (downloaded at container start), provisioned in
      # datasources.yml with credentials from these env vars — empty locally unless you
      # export them, in which case the Sentry datasource lights up in Explore.
      - GF_INSTALL_PLUGINS=grafana-sentry-datasource
      - SENTRY_ORG_SLUG=${SENTRY_ORG_SLUG:-}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN:-}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

  redis:
    image: redis:7-alpine
    container_name: aisandbox-redis
    # Refresh tokens are short-lived and re-mintable, so no persistence is needed — run purely
    # in-memory (disable RDB snapshots and the AOF) for a lean shared store.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: Auth/Dockerfile
    container_name: aisandbox-auth
    environment:
      SPRING_PROFILES_ACTIVE: DEV
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      LOKI_URL: http://loki:3100/loki/api/v1/push
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      # Where a successful Google login redirects with the issued tokens (see OAuth2LoginSuccessHandler).
      FRONTEND_URL: http://localhost:4200
      # Shared refresh-token store so Auth is stateless and `docker compose up --scale auth=2`
      # keeps refresh working across both replicas (see ADR-0007).
      AUTH_REFRESH_TOKEN_STORE: redis
      REDIS_HOST: redis
      # Behind the UI's nginx proxy, Spring must build external URLs (the Google OAuth
      # redirect_uri) from X-Forwarded-Host/Proto/Prefix, not from the proxied request line —
      # otherwise the redirect_uri comes out as http://localhost/login/... (port and /auth-api
      # prefix both lost). Set here rather than in application.properties so trusting
      # X-Forwarded-* stays scoped to this deployment, where nginx is the one setting them.
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      # Real Google sign-in is opt-in — pass these through from the host env if set; the demo
      # login (see the header comment above) works without them. The fallbacks must be the same
      # non-empty placeholders application.properties uses, not empty strings: an env var that
      # exists-but-is-empty overrides Spring's own ${GOOGLE_CLIENT_ID:your-client-id} default and
      # fails OAuth2ClientProperties validation ("Client id ... must not be empty") at startup.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-client-secret}
      # Sentry (per-service project). Empty (the default) = SDK disabled.
      SENTRY_DSN: ${SENTRY_DSN_AUTH:-}
    ports:
      - "8085:8085"
    depends_on:
      redpanda:
        condition: service_healthy
      tempo:
        condition: service_started
      redis:
        condition: service_healthy

  # The SPA, served by nginx on the host port the rest of this file already assumes for the
  # frontend origin (CORS_ALLOWED_ORIGINS / FRONTEND_URL both say http://localhost:4200). The
  # production bundle calls same-origin /auth-api and /audit-api paths, which nginx proxies to
  # auth/audit inside the network (see UI/nginx.conf) — so browser → API needs no CORS at all.
  # Demo login (demo/demo) works end-to-end out of the box. For the opt-in *Google* sign-in
  # (runs through the /auth-api proxy; auth honors the proxy's X-Forwarded-* headers — see
  # SERVER_FORWARD_HEADERS_STRATEGY on the auth service), two host-side steps are needed:
  # export real GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET before `docker compose up`, and add
  #   http://localhost:4200/auth-api/login/oauth2/code/google
  # as an authorized redirect URI of that client in the Google Cloud console. Without them the
  # Google button lands on Google's "Error 401: invalid_client" page (placeholder client id).
  ui:
    build:
      context: ../UI
    container_name: aisandbox-ui
    ports:
      - "4200:80"
    depends_on:
      auth:
        condition: service_started
      audit:
        condition: service_started
      # nginx resolves the /grafana proxy upstream at startup — the container must exist.
      grafana:
        condition: service_started

  audit:
    build:
      context: .
      dockerfile: Audit/Dockerfile
      # UI/ is outside this build context (Backend/), but Audit bundles the Angular source into
      # its RAG corpus — so pass it as a named build context the Dockerfile COPYs from (--from=ui).
      additional_contexts:
        ui: ../UI
    container_name: aisandbox-audit
    environment:
      SPRING_PROFILES_ACTIVE: DEV
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auditdb
      SPRING_DATASOURCE_USERNAME: audit
      SPRING_DATASOURCE_PASSWORD: audit
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      LOKI_URL: http://loki:3100/loki/api/v1/push
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      # Auth's JWKS endpoint, so Audit can verify JWTs Auth issued. DEV's own default assumes a
      # host named "auth-service"; this compose file's service is named "auth", so it's overridden.
      AUTH_JWK_SET_URI: http://auth:8085/.well-known/jwks.json
      # LLM chat assistant. Export ANTHROPIC_API_KEY on the host to enable it; with no key the
      # assistant endpoint returns 503 and the rest of the app is unaffected.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # RAG MCP server (POST /mcp — vector search over the repo's own docs). Export
      # VOYAGE_API_KEY on the host to enable indexing; with no key the search tool reports
      # "not configured" and everything else is unaffected. pgvector = the real vector DB
      # in this stack (LOCAL/tests default to the in-memory store instead).
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      RAG_VECTOR_STORE: pgvector
      # Sentry (per-service project). Empty (the default) = SDK disabled.
      SENTRY_DSN: ${SENTRY_DSN_AUDIT:-}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      tempo:
        condition: service_started
      auth:
        condition: service_started

volumes:
  postgres-data:
