# Production override for the GCE VM (ask-app.sahilparekh1212.com). Layered last:
#
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml -f docker-compose.prod.yml \
#     up -d --no-build --remove-orphans
#
# What it changes vs the local stack:
#   - Caddy terminates TLS on 80/443 (auto Let's Encrypt for $DOMAIN) in front of the ui
#     nginx; every other published port is withdrawn (`!reset`) — the proxy chain is the
#     only way in. Grafana is published read-only at https://$DOMAIN/grafana (anonymous
#     Viewer, see its environment below); Prometheus/Loki/Tempo stay SSH-tunnel only, e.g.
#     `gcloud compute ssh ask-app-vm -- -L 9090:localhost:9090`.
#   - PROD Spring profiles: WARN logging, no demo-data seeder, no demo-log endpoint (both
#     are LOCAL/DEV-gated beans). The recruiter demo login stays — it's property-gated
#     (auth.demo.enabled, default true), a deliberate keep for a portfolio deployment.
#   - Real origin (https://$DOMAIN) for CORS + the OAuth success redirect, and a non-default
#     Postgres password.
#   - AUTH_RSA_PRIVATE_KEY is multi-line PEM, which .env files can't carry — the deploy
#     workflow ships it as a root-only file and exports it into the shell that runs
#     `docker compose up` (shell env wins over .env), so the key never lands in .env.
#
# Interpolations marked :? fail fast when the deploy environment is incomplete rather than
# starting a half-configured stack. `!reset` needs docker compose >= 2.24 (the VM installs
# current Docker via get.docker.com).
services:
  caddy:
    image: caddy:2-alpine
    container_name: askapp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      ui:
        condition: service_started

  ui:
    restart: unless-stopped
    ports: !reset []

  auth:
    restart: unless-stopped
    ports: !reset []
    environment:
      SPRING_PROFILES_ACTIVE: PROD
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:?}
      FRONTEND_URL: https://${DOMAIN:?}
      # Stable signing key so tokens survive restarts and any future second replica agrees
      # on kid/JWKS. Exported by the deploy script from /opt/ask-app/secrets/auth_key.pem.
      AUTH_RSA_PRIVATE_KEY: ${AUTH_RSA_PRIVATE_KEY:?export from secrets/auth_key.pem}

  audit:
    restart: unless-stopped
    ports: !reset []
    environment:
      SPRING_PROFILES_ACTIVE: PROD
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:?}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}

  postgres:
    restart: unless-stopped
    ports: !reset []
    environment:
      # Applies on first initialization of the (fresh) VM volume; must match the audit
      # service's SPRING_DATASOURCE_PASSWORD above.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}

  redis:
    restart: unless-stopped
    ports: !reset []

  redpanda:
    restart: unless-stopped
    ports: !reset []

  redpanda-console:
    restart: unless-stopped
    ports: !reset []

  # Dev-only DB/Redis GUIs (Adminer, Redis Insight): never run in production — there's no reason
  # to expose a database admin UI on the deployed host. They stay default-on in the local
  # docker-compose.yml; assigning them a profile the prod deploy never activates keeps them out of
  # the prod stack entirely (not merely port-withdrawn like the services above).
  adminer:
    profiles: ["local-tools"]

  redisinsight:
    profiles: ["local-tools"]

  prometheus:
    restart: unless-stopped
    ports: !reset []

  loki:
    restart: unless-stopped
    ports: !reset []

  tempo:
    restart: unless-stopped
    ports: !reset []

  grafana:
    restart: unless-stopped
    ports: !reset []
    environment:
      # Published read-only at https://$DOMAIN/grafana via Caddy (see deploy/Caddyfile):
      # anonymous visitors get the Viewer role (dashboards + Explore, no edits/admin),
      # sign-up stays off, and the admin password comes from a repo secret instead of the
      # local stack's admin/admin. ROOT_URL + SERVE_FROM_SUB_PATH make Grafana itself own
      # the /grafana prefix, so Caddy proxies without rewriting.
      GF_SERVER_ROOT_URL: https://${DOMAIN:?}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}

volumes:
  caddy-data:
  caddy-config:
