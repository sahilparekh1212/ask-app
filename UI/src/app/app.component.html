<header class="app-header">
  <nav class="tabs">
    <a routerLink="/audit" routerLinkActive="active">{{ 'nav.dashboard' | t }}</a>
    <a routerLink="/assistant" routerLinkActive="active">{{ 'nav.chat' | t }}</a>
    <a routerLink="/flashcards" routerLinkActive="active">{{ 'nav.flashcards' | t }}</a>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{
      'nav.about' | t
    }}</a>
  </nav>

  <div class="header-right">
    <app-language-switcher />
    <!-- Google Website Translator renders here when the visitor picks "Google Translate" -->
    <div id="google_translate_element" hidden></div>

    @if (isAuthenticated()) {
      <a
        class="avatar"
        routerLink="/profile"
        routerLinkActive="active"
        [attr.aria-label]="'nav.profile' | t"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path
            d="M10.561 8.073a6 6 0 0 1 3.432 5.142.75.75 0 1 1-1.498.07 4.5 4.5 0 0 0-8.99 0 .75.75 0 0 1-1.498-.07 6 6 0 0 1 3.431-5.142 3.999 3.999 0 1 1 5.123 0ZM10.5 5a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"
          />
        </svg>
      </a>
    } @else {
      <a class="sign-in" routerLink="/login" routerLinkActive="active">{{ 'nav.login' | t }}</a>
    }
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>
