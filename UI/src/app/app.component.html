<header class="app-header">
  <nav class="tabs">
    <a routerLink="/audit" routerLinkActive="active">Dashboard</a>
    <a routerLink="/assistant" routerLinkActive="active">Chat</a>
    <a routerLink="/flashcards" routerLinkActive="active">Flashcards</a>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      >About</a
    >
  </nav>
  @if (isAuthenticated()) {
    <a class="avatar" routerLink="/profile" routerLinkActive="active" aria-label="Profile">
      <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
        <path
          d="M10.561 8.073a6 6 0 0 1 3.432 5.142.75.75 0 1 1-1.498.07 4.5 4.5 0 0 0-8.99 0 .75.75 0 0 1-1.498-.07 6 6 0 0 1 3.431-5.142 3.999 3.999 0 1 1 5.123 0ZM10.5 5a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"
        />
      </svg>
    </a>
  } @else {
    <a class="sign-in" routerLink="/login" routerLinkActive="active">Login</a>
  }
</header>

<main class="app-main">
  <router-outlet />
</main>
