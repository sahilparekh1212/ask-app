<header class="app-header">
  <a class="brand" routerLink="/">{{ title }}</a>
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/audit" routerLinkActive="active">Audit</a>
    <a routerLink="/assistant" routerLinkActive="active">Assistant</a>
    <a routerLink="/flashcards" routerLinkActive="active">Flashcards</a>
    @if (isAuthenticated()) {
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Sign in</a>
    }
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>
