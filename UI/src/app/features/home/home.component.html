@if (content(); as html) {
  <article class="readme" [innerHTML]="html"></article>
} @else if (failed()) {
  <div class="readme-status">
    <p>Couldn’t load the README.</p>
    <p><a [href]="repoUrl" target="_blank" rel="noopener">View it on GitHub →</a></p>
  </div>
} @else {
  <div class="readme-status" aria-live="polite">Loading…</div>
}
