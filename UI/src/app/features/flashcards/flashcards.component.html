<section class="flashcards">
  <p class="hint">{{ 'flashcards.hint' | t }}</p>

  <form class="controls" [formGroup]="form" (ngSubmit)="generate()">
    <label>
      {{ 'flashcards.cards' | t }}
      <input type="number" min="1" max="20" formControlName="count" />
    </label>
    <button type="submit" class="primary" [disabled]="loading()">
      {{
        loading()
          ? ('flashcards.generating' | t)
          : hasDeck()
            ? ('flashcards.regenerate' | t)
            : ('flashcards.generate' | t)
      }}
    </button>
    @if (hasDeck()) {
      <button type="button" (click)="shuffle()" [disabled]="loading()">
        {{ 'flashcards.shuffle' | t }}
      </button>
    }
  </form>

  @if (error(); as e) {
    <p class="error" role="alert">{{ e | t }}</p>
  }

  @if (hasDeck() && current(); as card) {
    <div class="deck">
      <button
        type="button"
        class="card"
        [class.flipped]="flipped()"
        (click)="flip()"
        [attr.aria-pressed]="flipped()"
      >
        <span class="side question">{{ card.question }}</span>
        <span class="side answer">{{ card.answer }}</span>
        <span class="face-label">{{
          flipped() ? ('flashcards.answer' | t) : ('flashcards.questionFlip' | t)
        }}</span>
      </button>

      <div class="nav">
        <button type="button" (click)="prev()" [disabled]="index() === 0">
          {{ 'flashcards.prev' | t }}
        </button>
        <span class="counter">{{ index() + 1 }} / {{ deck().length }}</span>
        <button type="button" (click)="next()" [disabled]="index() === deck().length - 1">
          {{ 'flashcards.next' | t }}
        </button>
      </div>
    </div>
  } @else if (!loading()) {
    <p class="empty">{{ 'flashcards.empty' | t }}</p>
  }
</section>
