<section class="login">
  <h1>{{ 'login.title' | t }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      {{ 'login.username' | t }}
      <input type="text" formControlName="username" autocomplete="username" />
    </label>
    <label>
      {{ 'login.password' | t }}
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>
    <label>
      {{ 'login.role' | t }}
      <select formControlName="role">
        <option value="ROLE_USER">ROLE_USER</option>
        <option value="ROLE_ADMIN">ROLE_ADMIN</option>
      </select>
    </label>

    @if (error(); as e) {
      <p class="error" role="alert">{{ e | t }}</p>
    }

    @if (redirecting()) {
      <p class="redirecting" role="status">{{ 'login.redirectingMsg' | t }}</p>
    }

    <button type="submit" [disabled]="form.invalid || submitting()">
      {{
        redirecting()
          ? ('login.redirecting' | t)
          : submitting()
            ? ('login.signingIn' | t)
            : ('login.demoLogin' | t)
      }}
    </button>
  </form>

  <div class="divider">
    <span>{{ 'login.or' | t }}</span>
  </div>

  <button type="button" class="google" (click)="loginWithGoogle()">{{ 'login.google' | t }}</button>

  <p class="hint oauth-note">{{ 'login.googleNote' | t }}</p>

  <p class="hint">{{ 'login.demoNote' | t }}</p>
</section>
