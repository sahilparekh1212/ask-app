<section class="profile">
  <h1>{{ 'profile.title' | t }}</h1>

  @if (profile(); as p) {
    <dl>
      <dt>{{ 'profile.userId' | t }}</dt>
      <dd>{{ p.userId }}</dd>
      <dt>{{ 'profile.email' | t }}</dt>
      <dd>{{ p.email || '—' }}</dd>
      <dt>{{ 'profile.name' | t }}</dt>
      <dd>{{ p.name || '—' }}</dd>
    </dl>
    <button type="button" (click)="logout()">{{ 'profile.logout' | t }}</button>
  } @else if (error(); as e) {
    <p class="error" role="alert">{{ e | t }}</p>
  } @else {
    <p>{{ 'profile.loading' | t }}</p>
  }
</section>
