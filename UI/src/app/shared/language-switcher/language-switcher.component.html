<div class="lang">
  <button
    type="button"
    class="trigger"
    (click)="toggle()"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
    [attr.aria-label]="'lang.label' | t"
    [title]="'lang.label' | t"
  >
    <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
      <path
        fill="currentColor"
        d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0ZM1.5 8a6.5 6.5 0 0 1 .2-1.6h2.6a16 16 0 0 0 0 3.2H1.7A6.5 6.5 0 0 1 1.5 8Zm.7 3.1h2.2c.2.9.5 1.7.9 2.4a6.5 6.5 0 0 1-3.1-2.4Zm2.2-6.2H2.2A6.5 6.5 0 0 1 5.3 2.5c-.4.7-.7 1.5-.9 2.4ZM7.3 14a6.6 6.6 0 0 1-1.8-3.3h1.8Zm0-4.8H5.3a14.4 14.4 0 0 1 0-2.4h2Zm0-3.9H5.5A6.6 6.6 0 0 1 7.3 2Zm7.2 2.4a6.5 6.5 0 0 1 0 3.2h-2.6a16 16 0 0 0 0-3.2Zm-.7-1.5h-2.2c-.2-.9-.5-1.7-.9-2.4a6.5 6.5 0 0 1 3.1 2.4ZM8.7 2a6.6 6.6 0 0 1 1.8 3.3H8.7Zm0 4.8h2a14.4 14.4 0 0 1 0 2.4h-2Zm0 7.2v-3.3h1.8A6.6 6.6 0 0 1 8.7 14Zm2.1-.5c.4-.7.7-1.5.9-2.4h2.2a6.5 6.5 0 0 1-3.1 2.4Z"
      />
    </svg>
    <span class="code">{{ currentCode() }}</span>
  </button>

  @if (open()) {
    <ul class="menu" role="listbox" [attr.aria-label]="'lang.label' | t">
      @for (l of languages; track l.code) {
        <li>
          <button
            type="button"
            role="option"
            [attr.aria-selected]="l.code === current()"
            [class.active]="l.code === current()"
            (click)="select(l.code)"
          >
            {{ l.label }}
          </button>
        </li>
      }
      <li class="sep">
        <button type="button" (click)="translateWithGoogle()">{{ 'lang.google' | t }}</button>
      </li>
    </ul>
  }
</div>
