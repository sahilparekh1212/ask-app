# Serves the built SPA and reverse-proxies the same-origin API prefixes that the production
# environment.ts expects (/auth-api, /audit-api) to the compose services — so the browser only
# ever talks to one origin and CORS never enters the picture on this path.
#
# The upstream hostnames (auth/audit) are the docker-compose service names; nginx resolves them
# at startup, so this image is meant to run inside the compose network (see
# Backend/docker-compose.yml), not standalone.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ^~ so these prefixes always win over the regex cache location below — an API path that
    # happens to end in .js/.css must still be proxied, never served from disk.
    location ^~ /auth-api/ {
        proxy_pass http://auth:8085/;
        # $http_host, not $host: $host drops the port, and Spring builds the OAuth redirect_uri
        # from it — Google would be told to send the code back to http://localhost/ (port 80).
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Explicit, because once X-Forwarded-Proto is present Spring's ForwardedHeaderFilter
        # resets the port to the scheme default unless a forwarded host/port says otherwise.
        # $http_host (the browser's Host, port included) — NOT $server_port, which is this
        # container's internal listen port (80), not the published one (4200).
        proxy_set_header X-Forwarded-Host $http_host;
        # The stripped prefix, for upstreams that reconstruct their external URL (see the Google
        # OAuth note on the ui service in Backend/docker-compose.yml).
        proxy_set_header X-Forwarded-Prefix /auth-api;
    }

    location ^~ /audit-api/ {
        proxy_pass http://audit:8083/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /audit-api;
    }

    # The system-view links (audit sticky bar, About page) are same-origin /grafana in the
    # production environment.ts — this proxy makes them work on the local compose stack too.
    # No trailing slash on proxy_pass: the /grafana prefix is passed through unstripped, and
    # Grafana serves under it itself (GF_SERVER_SERVE_FROM_SUB_PATH, set in the compose file).
    # In prod, Caddy's own /grafana route answers first, so this block is simply shadowed there.
    location ^~ /grafana {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular's production build content-hashes every bundle (outputHashing: all), so anything
    # that isn't index.html can be cached forever; a new deploy changes the filenames.
    location ~* \.(?:js|css|woff2?|svg|png|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached — it's the one file whose content changes in place and
    # whose script tags point at the current hashed bundles.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # i18n dictionaries are unhashed but only change on deploy — cache them (gzipped) with a
    # short TTL so switching/reloading a language is instant on repeat visits, while a new deploy
    # still propagates within the hour. The TranslateService also keeps an in-memory copy per
    # session, so a given language is fetched at most once per page load.
    location ^~ /i18n/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # SPA fallback: deep links like /audit or /login/callback are client-side routes; serve
    # index.html and let the Angular router take it from there.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
