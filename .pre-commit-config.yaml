# Pre-commit hooks (must live at the git repo root). Install once:
#   python -m pre_commit install
# Then gitleaks scans staged changes on every commit and blocks anything secret-like.
# Scan the whole repo on demand:  python -m pre_commit run --all-files
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
